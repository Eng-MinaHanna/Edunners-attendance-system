<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>نظام الدرجات والتقييم | Eduneers</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
    :root { 
      --primary: #0f172a; --primary-light: #1e293b; --accent: #f5b041; --accent-glow: rgba(245, 176, 65, 0.6);
      --electric-blue: #00d2ff; --electric-glow: rgba(0, 210, 255, 0.5); --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      --text-main: #334155; --text-muted: #64748b; --card-bg: rgba(255, 255, 255, 0.85); --border-radius: 24px;   
    }
    body.dark-mode { --primary: #f8fafc; --bg-gradient: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%); --text-main: #f8fafc; --text-muted: #cbd5e1; --card-bg: rgba(15, 23, 42, 0.85); }
    body { font-family: 'Cairo', sans-serif; background: var(--bg-gradient); margin: 0; color: var(--text-main); min-height: 100vh; transition: 0.5s; }
    .circuit-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background-image: radial-gradient(circle at 50% 50%, rgba(245, 176, 65, 0.05) 2px, transparent 2px), linear-gradient(rgba(245, 176, 65, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(245, 176, 65, 0.03) 1px, transparent 1px); background-size: 40px 40px; animation: pulseCircuit 10s infinite alternate; }
    body.dark-mode .circuit-bg { background-image: radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.1) 2px, transparent 3px), linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px); }
    @keyframes pulseCircuit { 0% { opacity: 0.3; } 100% { opacity: 0.8; } }
    .navbar { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); color: white; padding: 12px 0; box-shadow: 0 4px 30px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 100; transition: 0.5s; }
    body.dark-mode .navbar { background: rgba(15, 23, 42, 0.98); border-bottom: 1px solid rgba(0, 210, 255, 0.15); }
    .nav-content { max-width: 1000px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
    .nav-brand h2 { margin: 0; font-size: 1.5rem; font-weight: 800; background: linear-gradient(to left, #fff, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
    body.dark-mode .nav-brand h2 { background: linear-gradient(to left, #fff, var(--electric-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
    .nav-actions { display: flex; gap: 12px; align-items: center; }
    .nav-badge { font-size: 12px; font-weight: 800; padding: 6px 12px; border-radius: 8px; font-family: monospace; backdrop-filter: blur(5px); }
    .group-badge { background: rgba(245, 176, 65, 0.1); color: var(--accent); border: 1px solid rgba(245, 176, 65, 0.3); }
    body.dark-mode .group-badge { background: rgba(0, 210, 255, 0.1); color: var(--electric-blue); border: 1px solid rgba(0, 210, 255, 0.3); }
    .theme-toggle { background: none; border: none; font-size: 1.4rem; cursor: pointer; width: 35px; height: 35px; border-radius: 50%; transition: 0.3s; }
    .theme-toggle:hover { background: rgba(255,255,255,0.1); }
    body.dark-mode .theme-toggle:hover { text-shadow: 0 0 10px var(--electric-blue);}
    .container { padding: 40px 20px; max-width: 1000px; margin: auto; position: relative; z-index: 1; }
    .form-wrapper { max-width: 600px; width: 100%; margin: 0 auto; }
    .view-section { display: none; background: var(--card-bg); padding: 35px 25px; border-radius: var(--border-radius); box-shadow: 0 20px 40px rgba(0,0,0,0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.2); animation: slideUp 0.5s ease; margin-bottom: 25px; transition: 0.5s;}
    .view-section.active { display: block; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px) } to { opacity: 1; transform: translateY(0) } }
    select, input[type="text"], input[type="number"] { width: 100%; padding: 14px 20px; border-radius: 16px; border: 2px solid transparent; background-color: #f8fafc; color: var(--text-main); font-size: 15px; font-weight: 800; margin-bottom: 15px; box-sizing: border-box; font-family: 'Cairo', sans-serif; text-align: center; transition: 0.3s;}
    body.dark-mode input[type="text"], body.dark-mode input[type="number"], body.dark-mode select { background-color: #1e293b; color: #fff; border: 1px solid #334155; }
    body.dark-mode input:focus, body.dark-mode select:focus { border-color: var(--electric-blue); box-shadow: 0 0 10px var(--electric-glow); background-color: #0f172a;}
    button { padding: 16px; width: 100%; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; border: none; margin-bottom: 15px; font-family: 'Cairo', sans-serif; transition: 0.3s; }
    button:active { transform: scale(0.96); }
    .btn-primary { background: linear-gradient(135deg, #9333ea, #7e22ce); color: white; box-shadow: 0 10px 20px rgba(147, 51, 234, 0.2); }
    body.dark-mode .btn-primary { background: linear-gradient(135deg, var(--electric-blue), #0284c7); box-shadow: 0 0 15px var(--electric-glow); color:#fff;}
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(147, 51, 234, 0.4); }
    .btn-secondary { background: linear-gradient(135deg, var(--accent), #f39c12); color: #fff; }
    .btn-secondary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--accent-glow); }
    
    .grades-grid { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; justify-content: center;}
    .grade-box { flex: 1; min-width: 140px; text-align: center; background: rgba(0,0,0,0.02); padding: 15px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.05); transition: 0.3s;}
    body.dark-mode .grade-box { background: #1e293b; border-color: #334155; }
    .grade-box label { font-size: 13px; font-weight: 800; color: var(--text-muted); display: block; margin-bottom: 8px; text-transform: uppercase;}
    .grade-box input, .grade-box select { margin-bottom: 0; background: #fff;}
    body.dark-mode .grade-box input, body.dark-mode .grade-box select { background: #0f172a;}
    
    #message { margin-top: 15px; padding: 18px; border-radius: 16px; font-weight: 800; display: none; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px;}
    .success { background: rgba(16, 185, 129, 0.1); color: #059669; border: 1px solid #a7f3d0; }
    .error { background: rgba(239, 68, 68, 0.1); color: #dc2626; border: 1px solid #fecaca; }
    .warning { background: rgba(245, 176, 65, 0.1); color: #d97706; border: 1px solid #fde68a; }
    body.dark-mode .success { color: #34d399; border-color: #059669;}
    body.dark-mode .error { color: #f87171; border-color: #dc2626;}

    .admin-only, .manager-only, .cross-group-only { display: none !important; }
    body.role-owner .admin-only, body.role-co-founder .admin-only, body.role-admin .admin-only { display: block !important; }
    body.role-owner .manager-only, body.role-co-founder .manager-only, body.role-admin .manager-only, body.role-manager .manager-only { display: block !important; }
    body.role-owner div.cross-group-only, body.role-co-founder div.cross-group-only, body.role-admin div.cross-group-only { display: flex !important; }
    
    #electricLoader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 9999; color: var(--text-main); transition: opacity 0.3s;}
    body.dark-mode #electricLoader { color: var(--electric-blue); }
    .loader-text { margin-bottom: 20px; font-size: 18px; font-weight: 700; text-shadow: 0 0 10px currentColor;}
    .progress-bar-container { width: 80%; max-width: 400px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; box-shadow: inset 0 0 5px rgba(0,0,0,0.5);}
    .progress-bar-fill { height: 100%; width: 0%; background: #9333ea; box-shadow: 0 0 15px #9333ea; border-radius: 10px; transition: width 0.1s linear;}
    body.dark-mode .progress-bar-fill { background: var(--electric-blue); box-shadow: 0 0 15px var(--electric-glow); }
    .loader-percent { margin-top: 15px; font-size: 24px; font-weight: 800; font-family: monospace; text-shadow: 0 0 10px currentColor; color: #9333ea;}
    body.dark-mode .loader-percent { color: var(--electric-blue); }
    
    .chart-container { position: relative; height: 350px; width: 100%; background: #fff; border-radius: 20px; border: 1px solid #e2e8f0; padding: 15px; box-sizing: border-box; margin-bottom: 25px;}
    body.dark-mode .chart-container { background: rgba(15, 23, 42, 0.9); border-color: #334155; }
  </style>
</head>
<body>

  <div class="circuit-bg"></div>

  <div id="electricLoader">
    <div class="loader-text" id="loaderMessage">جاري نقل البيانات...</div>
    <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBarFill"></div></div>
    <div class="loader-percent" id="loaderPercent">0%</div>
  </div>

  <div class="navbar">
    <div class="nav-content">
      <div class="nav-brand"><h2>🎯 نظام التقييم</h2></div>
      <div class="nav-actions">
        <span id="groupBadge" class="nav-badge group-badge" style="display: none;"></span>
        <button class="theme-toggle" id="themeToggle" onclick="toggleDarkMode()">☀️</button>
        <button class="theme-toggle" onclick="window.location.href='index.html'" title="العودة لنظام الحضور">🏠</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="message"></div>

    <div class="cross-group-only" style="background: var(--card-bg); padding: 20px; border-radius: var(--border-radius); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.2);">
      <div style="flex: 1;">
        <p style="margin: 0 0 10px 0; font-weight: 800; color: #8e44ad; font-size: 13px; text-transform: uppercase; text-align:center;">تحكم الجروب 👑</p>
        <select id="globalGroupSelect" style="margin-bottom: 0; border-color: rgba(142, 68, 173, 0.3); background: rgba(142, 68, 173, 0.05); color:#8e44ad;" onchange="changeGlobalGroup(this.value)"></select>
      </div>
    </div>

    <!-- Toggle Buttons -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px;" class="form-wrapper">
      <button class="btn-primary" onclick="switchView('grading')" style="flex:1; padding: 10px;">📝 الرصد</button>
      <button class="btn-secondary manager-only" onclick="switchView('top')" style="flex:1; padding: 10px; background: linear-gradient(135deg, #10b981, #059669);">🏆 لوحة الشرف</button>
      <button class="btn-secondary admin-only" onclick="switchView('settings')" style="flex:1; padding: 10px; background: #94a3b8; color:#fff;">⚙️ الكويزات</button>
    </div>

    <!-- 📝 قسم رصد الدرجات المفتوح -->
    <div id="view-grading" class="view-section active">
      <div class="form-wrapper">
        <h3 style="text-align: center; color: var(--primary); margin-top:0;">رصد الدرجات</h3>
        <p style="text-align:center; color:var(--text-muted); font-size:13px; font-weight:700; margin-bottom:20px;">الجروب الحالي: <span id="lblCurrentGroup" style="color:var(--electric-blue);">Group A</span></p>

        <div style="display:flex; gap:10px; margin-bottom: 20px;">
          <input type="text" id="studentCode" placeholder="كود الطالب (يدوي أو سكان)" style="margin-bottom:0;">
          <button class="btn-secondary" style="width: auto; margin-bottom:0; padding: 0 20px;" onclick="document.getElementById('qr-input-file').click()">📷</button>
          <input type="file" id="qr-input-file" accept="image/*" capture="environment" style="display:none;" onchange="handleQRImage(event)">
        </div>

        <div class="grades-grid">
          <div class="grade-box">
            <label>رقم التاسك</label>
            <select id="taskNum">
               <option value="">-- اختر --</option>
               <script>for(let i=1;i<=20;i++) document.write(`<option value="${i}">Task ${i}</option>`);</script>
            </select>
            <label style="margin-top:10px;">الدرجة (من 70)</label>
            <input type="number" id="gradeTask" placeholder="0" max="70" min="0">
          </div>
          <div class="grade-box">
            <label>رقم الكويز</label>
            <select id="quizNum" onchange="fetchMaxQuizGrade()">
               <option value="">-- اختر --</option>
               <script>for(let i=1;i<=40;i++) document.write(`<option value="${i}">Quiz ${i}</option>`);</script>
            </select>
            <label style="margin-top:10px;">الدرجة (من <span id="lblQuizMax">?</span>)</label>
            <input type="number" id="gradeQuiz" placeholder="0" min="0">
          </div>
        </div>

        <button class="btn-primary" onclick="submitGrades()">حفظ السجل 💾</button>
      </div>
    </div>

    <!-- 🏆 لوحة الشرف (Top 5 Chart) -->
    <div id="view-top" class="view-section manager-only">
      <div class="form-wrapper">
        <h3 style="text-align: center; color: var(--primary); margin-top:0;">🏆 لوحة شرف الجروب (Top 5)</h3>
        <p style="text-align:center; color:var(--text-muted); font-size:13px; font-weight:700;">يتم حساب (5 درجات للحضور) + (5 للفيدباك) + (درجات التاسكات) + (درجات الكويزات)</p>

        <div class="grades-grid" style="margin-top: 20px;">
          <!-- الحضور والفيدباك يعتمدان على المحاضرات -->
          <div class="grade-box" style="flex-basis: 100%;">
            <label>الحضور والفيدباك (بالأسابيع/المحاضرات)</label>
            <div style="display:flex; gap:5px; align-items:center; justify-content:center;">
              من <input type="number" id="fromLec" value="1" min="1" max="20" style="padding:8px;"> 
              إلى <input type="number" id="toLec" value="5" min="1" max="20" style="padding:8px;">
            </div>
          </div>
          <div class="grade-box">
            <label>نطاق التاسكات</label>
            <div style="display:flex; gap:5px; align-items:center; justify-content:center;">
              من <input type="number" id="fromTask" value="1" min="1" max="20" style="padding:8px; width:60px;"> 
              إلى <input type="number" id="toTask" value="5" min="1" max="20" style="padding:8px; width:60px;">
            </div>
          </div>
          <div class="grade-box">
            <label>نطاق الكويزات</label>
            <div style="display:flex; gap:5px; align-items:center; justify-content:center;">
              من <input type="number" id="fromQuiz" value="1" min="1" max="40" style="padding:8px; width:60px;"> 
              إلى <input type="number" id="toQuiz" value="5" min="1" max="40" style="padding:8px; width:60px;">
            </div>
          </div>
        </div>
        
        <button class="btn-secondary" onclick="generateTopChart()" style="background: linear-gradient(135deg, #10b981, #059669);">استخراج أعلى 5 طلاب 🚀</button>
      </div>
      
      <div class="chart-container" style="margin-top:20px;">
        <canvas id="topChart"></canvas>
      </div>
    </div>

    <!-- ⚙️ إعدادات الإدارة (Admin Only) -->
    <div id="view-settings" class="view-section admin-only">
      <div class="form-wrapper">
        <h3 style="text-align: center; color: var(--primary); margin-top:0;">إعدادات نهايات الكويزات 🔒</h3>
        <p style="text-align:center; color:var(--text-muted); font-size:14px; font-weight:700; margin-bottom: 25px;">حدد النهاية العظمى لكل كويز لتقييد المساعدين.</p>
        
        <label style="font-weight: 800; font-size: 14px; margin-bottom: 5px; display:block;">اختر الكويز المستهدف:</label>
        <select id="settingQuizNum" onchange="loadSettingQuizMax()">
          <script>for(let i=1;i<=40;i++) document.write(`<option value="${i}">Quiz ${i}</option>`);</script>
        </select>
        
        <label style="font-weight: 800; font-size: 14px; margin-bottom: 5px; display:block; margin-top:15px;">النهاية العظمى المسموحة (Max Grade):</label>
        <input type="number" id="settingQuizMax" placeholder="مثال: 15">
        
        <button class="btn-primary" onclick="saveQuizMax()">حفظ وإغلاق الكويز 🔒</button>
      </div>
    </div>

  </div>

  <script>
    // ⚠️ استبدل هذه الروابط بروابط الـ Apps Script الأربعة الخاصة بك
    const GRADES_API_URL = "https://script.google.com/macros/s/AKfycbzJkCGpIcc6uzgITufJcDnv8yC2RvF-DTlX1rw-9ZojdHmQyj2GSHsPFFAKCOiWV4Q/exec"; 
    const QUIZZES_API_URL = "https://script.google.com/macros/s/AKfycbzL9jhUwFFZbPOFSoAtnOIR8qsvdXNzzSJ7kRMNaxb3f2CV_G95HUOdwxDqmJ5i-jHUEQ/exec"; 
    const ATTENDANCE_API_URL = "https://script.google.com/macros/s/AKfycbyKdM1HWykrFkeI_n_DVQhJ1t8xxk8Zg8zL5eXSc3zsFwdYfXTBUW9C77EabSO4zRgL7g/exec"; 
    const FEEDBACK_API_URL = "https://script.google.com/macros/s/AKfycbz06d7stdEv5_4m529xIKToSNiR-_pciUDFcdhFQXA7RrE9rt_Puv8dhBdpR4V5L3XioQ/exec"; 
    
    let currentView = 'grading';
    let currentQuizMax = 15; 
    let topChartInstance = null;

    let loaderInterval;
    function showProgress(msg) {
      document.getElementById('electricLoader').style.display = 'flex';
      document.getElementById('electricLoader').style.opacity = '1';
      document.getElementById('loaderMessage').innerText = msg;
      let p = 0; document.getElementById('loaderPercent').innerText = p + '%';
      document.getElementById('progressBarFill').style.width = p + '%';
      clearInterval(loaderInterval);
      loaderInterval = setInterval(() => {
        p += Math.floor(Math.random() * 8) + 1; if(p > 90) p = 90;
        document.getElementById('loaderPercent').innerText = p + '%';
        document.getElementById('progressBarFill').style.width = p + '%';
      }, 100);
    }
    function completeProgress() {
      clearInterval(loaderInterval);
      document.getElementById('loaderPercent').innerText = '100%';
      document.getElementById('progressBarFill').style.width = '100%';
      setTimeout(() => {
        document.getElementById('electricLoader').style.opacity = '0';
        setTimeout(() => { document.getElementById('electricLoader').style.display = 'none'; document.getElementById('progressBarFill').style.width = '0%';}, 300);
      }, 400);
    }
    
    function getAuthParams() {
      const email = localStorage.getItem('userEmail') || "";
      const sessionToken = localStorage.getItem('sessionToken') || "";
      return `&email=${encodeURIComponent(email)}&token=${encodeURIComponent(sessionToken)}`;
    }

    function showMessage(text, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.style.display = 'block'; msgDiv.className = type; msgDiv.innerText = text;
      if(window.messageTimer) clearTimeout(window.messageTimer);
      window.messageTimer = setTimeout(() => { msgDiv.style.display = 'none'; }, 5000);
    }

    function playBeep(type) {
      if (navigator.vibrate) { if (type === 'success') navigator.vibrate(150); else navigator.vibrate([100, 50, 100, 50, 200]); }
      const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      if(type === 'success') { osc.type = 'sine'; osc.frequency.value = 800; gain.gain.value = 0.1; osc.start(); osc.stop(ctx.currentTime + 0.15); } 
      else { osc.type = 'sawtooth'; osc.frequency.value = 300; gain.gain.value = 0.1; osc.start(); osc.stop(ctx.currentTime + 0.3); }
    }

    window.onload = function() {
      if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.getElementById('themeToggle').innerText = '🌙';
      }
      
      if (localStorage.getItem('isLoggedIn') !== 'true') {
        alert("🔒 غير مصرح بالوصول! يرجى تسجيل الدخول من نظام الحضور أولاً.");
        window.location.href = 'index.html';
        return;
      }
      
      fillGroupSelects();
      applyRoleAndGroup();
      loadSettingQuizMax();
    };

    function fillGroupSelects() {
      let options = ''; const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      for(let i=0; i<letters.length; i++) { let g = 'Group ' + letters[i]; options += `<option value="${g}">${g}</option>`; }
      const ggs = document.getElementById('globalGroupSelect');
      if(ggs && ggs.options.length === 0) { ggs.innerHTML = options; ggs.value = localStorage.getItem('userGroup') || 'Group A'; }
    }

    function applyRoleAndGroup() {
      const userRole = localStorage.getItem('userRole'); 
      const userGroup = localStorage.getItem('userGroup') || 'Group A';
      
      const groupBadge = document.getElementById('groupBadge');
      if(groupBadge) { groupBadge.innerText = userGroup; groupBadge.style.display = 'flex'; }
      
      document.getElementById('lblCurrentGroup').innerText = userGroup;
      document.getElementById('lblTopGroup').innerText = userGroup;
      
      document.body.className = document.body.classList.contains('dark-mode') ? 'dark-mode ' : ''; 
      if (userRole === 'Owner') { document.body.classList.add('role-owner'); } 
      else if (userRole === 'CO-Founder') { document.body.classList.add('role-co-founder'); } 
      else if (userRole === 'Team Manager' || userRole === 'Admin') { document.body.classList.add('role-admin'); } 
      else if (userRole === 'Coordinator' || userRole === 'Manager') { document.body.classList.add('role-manager'); } 
      else { document.body.classList.add('role-user'); }
      
      const ggs = document.getElementById('globalGroupSelect'); if(ggs) ggs.value = userGroup;
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('darkMode', isDark);
      document.getElementById('themeToggle').innerText = isDark ? '🌙' : '☀️';
      if(topChartInstance) generateTopChart(); // Redraw chart colors
    }

    function switchView(viewId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.getElementById(`view-${viewId}`).classList.add('active');
    }

    function changeGlobalGroup(newGroup) {
      localStorage.setItem('userGroup', newGroup); 
      applyRoleAndGroup();
    }

    function loadSettingQuizMax() {
      const qNum = document.getElementById('settingQuizNum').value;
      const savedMax = localStorage.getItem(`maxQuiz_${qNum}`) || 15;
      document.getElementById('settingQuizMax').value = savedMax;
    }

    function saveQuizMax() {
      const qNum = document.getElementById('settingQuizNum').value;
      const maxVal = document.getElementById('settingQuizMax').value;
      if(!maxVal) return alert("أدخل درجة النهاية العظمى");
      localStorage.setItem(`maxQuiz_${qNum}`, maxVal);
      showMessage(`✅ تم حفظ النهاية العظمى لـ Quiz ${qNum} بنجاح!`, "success");
      fetchMaxQuizGrade();
    }

    function fetchMaxQuizGrade() {
      const qNum = document.getElementById('quizNum').value;
      if(qNum === "") { document.getElementById('lblQuizMax').innerText = "?"; currentQuizMax = 0; return; }
      const savedMax = localStorage.getItem(`maxQuiz_${qNum}`) || 15;
      currentQuizMax = parseInt(savedMax);
      document.getElementById('lblQuizMax').innerText = currentQuizMax;
    }

    function handleQRImage(e) {
      if (e.target.files.length == 0) return;
      const html5QrCode = new Html5Qrcode("reader"); 
      showMessage("⏳ جاري تحليل الصورة...", "info");
      
      html5QrCode.scanFile(e.target.files[0], true)
      .then(decodedText => { 
          let code = decodedText.toUpperCase();
          const userGroup = localStorage.getItem('userGroup') || "Group A"; 
          const groupLetter = userGroup.replace("Group ", "").trim();
          if (/^\d+$/.test(code)) { code = groupLetter + code; }
          if (!code.endsWith("EDUR9")) { code = code + "EDUR9"; }
          document.getElementById('studentCode').value = code; 
          showMessage("✅ تم قراءة الكود! أدخل الدرجات الآن.", "success"); playBeep('success');
      }).catch(err => { showMessage("❌ لم يتم التعرف على الـ QR.", "error"); playBeep('error'); });
    }

    async function submitGrades() {
      let code = document.getElementById('studentCode').value.trim();
      let taskNum = document.getElementById('taskNum').value;
      let taskVal = document.getElementById('gradeTask').value;
      let quizNum = document.getElementById('quizNum').value;
      let quizVal = document.getElementById('gradeQuiz').value;
      
      if(!code) return alert("أدخل كود الطالب أولاً!");
      if(taskVal === "" && quizVal === "") return alert("أدخل درجة واحدة على الأقل!");
      if(taskVal !== "") { if(taskNum === "") return alert("حدد رقم التاسك أولاً!"); if(parseInt(taskVal) > 70 || parseInt(taskVal) < 0) return alert("درجة التاسك أقصاها 70."); }
      if(quizVal !== "") { if(quizNum === "") return alert("حدد رقم الكويز أولاً!"); if(parseInt(quizVal) > currentQuizMax || parseInt(quizVal) < 0) return alert(`درجة الكويز لا تتخطى ${currentQuizMax}`); }

      const role = localStorage.getItem('userRole');
      if (role === 'Owner' || role === 'CO-Founder' || role === 'Team Manager' || role === 'Admin') {
          const match = code.match(/^[A-Z]+/);
          if (match) { const detectedGroup = "Group " + match[0]; localStorage.setItem('userGroup', detectedGroup); applyRoleAndGroup(); }
      }
      
      const userGroup = localStorage.getItem('userGroup') || "Group A"; 
      const groupLetter = userGroup.replace("Group ", "").trim();
      if (/^\d+$/.test(code)) { code = groupLetter + code; }
      if (!code.endsWith("EDUR9")) { code = code + "EDUR9"; }

      const auth = getAuthParams();
      showProgress("جاري حفظ التقييم 📡...");
      
      try {
        let promises = [];
        if (taskVal !== "") promises.push(fetch(`${GRADES_API_URL}?action=saveGrade&qrCode=${encodeURIComponent(code)}&taskNum=${encodeURIComponent(taskNum)}&group=${encodeURIComponent(userGroup)}&val=${taskVal}${auth}`));
        if (quizVal !== "") promises.push(fetch(`${QUIZZES_API_URL}?action=saveQuiz&qrCode=${encodeURIComponent(code)}&quizNum=${encodeURIComponent(quizNum)}&group=${encodeURIComponent(userGroup)}&val=${quizVal}${auth}`));

        const responses = await Promise.all(promises);
        let allSuccess = true;
        for(let res of responses) { let data = await res.json(); if(data.status !== "success") allSuccess = false; }

        completeProgress();
        if (allSuccess) {
           showMessage(`✅ تم رصد درجات الطالب بنجاح!`, "success"); playBeep('success');
           document.getElementById('studentCode').value = ""; document.getElementById('gradeTask').value = ""; document.getElementById('gradeQuiz').value = "";
        } else { showMessage("⚠️ خطأ. تحقق من الكود.", "warning"); playBeep('error'); }
      } catch(err) { completeProgress(); showMessage("❌ فشل الاتصال.", "error"); playBeep('error'); }
    }

    // 🏆 لوحة الشرف والرسم البياني المجمعة (Parallel Processing)
    async function generateTopChart() {
      const fTask = document.getElementById('fromTask').value; const tTask = document.getElementById('toTask').value;
      const fQuiz = document.getElementById('fromQuiz').value; const tQuiz = document.getElementById('toQuiz').value;
      const fLec = document.getElementById('fromLec').value; const tLec = document.getElementById('toLec').value;
      
      if(parseInt(fTask) > parseInt(tTask) || parseInt(fQuiz) > parseInt(tQuiz) || parseInt(fLec) > parseInt(tLec)) return alert("نطاق الأرقام غير صحيح");

      const group = localStorage.getItem('userGroup') || "Group A";
      const auth = getAuthParams();

      showProgress("جاري دمج بيانات (الدرجات + الحضور + الفيدباك) 🚀...");
      
      try {
          // 🚀 إطلاق 4 طلبات للسيرفر في نفس الوقت
          const [taskRes, quizRes, attRes, feedRes] = await Promise.all([
            fetch(`${GRADES_API_URL}?action=getTop&fromTask=${fTask}&toTask=${tTask}&group=${encodeURIComponent(group)}${auth}`),
            fetch(`${QUIZZES_API_URL}?action=getTop&fromQuiz=${fQuiz}&toQuiz=${tQuiz}&group=${encodeURIComponent(group)}${auth}`),
            fetch(`${ATTENDANCE_API_URL}?action=getTop&fromLec=${fLec}&toLec=${tLec}&group=${encodeURIComponent(group)}${auth}`).catch(() => ({json: () => ({scores:[]})})), // تخطي لو الرابط فارغ
            fetch(`${FEEDBACK_API_URL}?action=getTop&fromLec=${fLec}&toLec=${tLec}&group=${encodeURIComponent(group)}${auth}`).catch(() => ({json: () => ({scores:[]})}))
          ]);
          
          const taskData = await taskRes.json();
          const quizData = await quizRes.json();
          const attData = await attRes.json();
          const feedData = await feedRes.json();
          
          completeProgress();

          if (taskData.status === "success" && quizData.status === "success") {
             
             let mergedScores = {};
             
             // دالة لدمج المجاميع
             const processScores = (arr) => {
               (arr || []).forEach(item => {
                 if(!mergedScores[item.id]) mergedScores[item.id] = { name: item.name, total: 0 };
                 mergedScores[item.id].total += item.total;
               });
             };

             processScores(taskData.scores);
             processScores(quizData.scores);
             processScores(attData.scores);
             processScores(feedData.scores);

             // تحويل لـ Array وترتيب تنازلي (أعلى 5)
             let sortedStudents = Object.values(mergedScores).sort((a, b) => b.total - a.total).slice(0, 5);

             if(sortedStudents.length === 0) return showMessage("⚠️ لا توجد أي درجات أو حضور مسجل في هذا النطاق.", "warning");

             // تجهيز البيانات للرسم (أول اسمين فقط)
             const labels = sortedStudents.map(s => {
                let nameParts = s.name.trim().split(/\s+/);
                return nameParts[0] + " " + (nameParts[1] || "");
             });
             const dataPoints = sortedStudents.map(s => s.total);

             drawChart(labels, dataPoints);

          } else { showMessage("❌ فشل في قراءة بعض البيانات من السيرفر.", "error"); }
      } catch(err) { completeProgress(); showMessage("❌ فشل الاتصال بالسيرفر", "error"); }
    }

    function drawChart(labelsArray, dataArray) {
      const ctx = document.getElementById('topChart').getContext('2d');
      if (topChartInstance) topChartInstance.destroy();
      
      const isDark = document.body.classList.contains('dark-mode');
      const chartColor = isDark ? '#00d2ff' : '#9333ea';
      const gridColor = isDark ? '#334155' : '#e2e8f0';

      topChartInstance = new Chart(ctx, {
        type: 'bar',
        data: { labels: labelsArray, datasets: [{ label: 'مجموع النقاط الكلي', data: dataArray, backgroundColor: chartColor, borderColor: '#f5b041', borderWidth: 2, borderRadius: 12 }] },
        options: { 
          responsive: true, maintainAspectRatio: false, 
          scales: { 
            x: { grid: { display: false }, ticks: { color: isDark ? '#cbd5e1' : '#64748b', font: {family: 'Cairo', weight: 'bold'} } }, 
            y: { beginAtZero: true, ticks: { color: isDark ? '#cbd5e1' : '#64748b' }, grid: { color: gridColor, borderDash: [4, 4] } } 
          }, 
          plugins: { legend: { display: false } }, animation: { duration: 2000, easing: 'easeOutBounce' } 
        }
      });
    }
  </script>
